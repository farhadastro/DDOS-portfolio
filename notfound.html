<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDOS Intelligence System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            display: block;
            pointer-events: none;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
            animation-duration: 20s;
        }

        .particle:nth-child(2) {
            left: 20%;
            animation-delay: 2s;
            animation-duration: 25s;
        }

        .particle:nth-child(3) {
            left: 30%;
            animation-delay: 4s;
            animation-duration: 15s;
        }

        .particle:nth-child(4) {
            left: 40%;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .particle:nth-child(5) {
            left: 50%;
            animation-delay: 3s;
            animation-duration: 22s;
        }

        .particle:nth-child(6) {
            left: 60%;
            animation-delay: 1s;
            animation-duration: 19s;
        }

        .particle:nth-child(7) {
            left: 70%;
            animation-delay: 5s;
            animation-duration: 24s;
        }

        .particle:nth-child(8) {
            left: 80%;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .particle:nth-child(9) {
            left: 90%;
            animation-delay: 4s;
            animation-duration: 21s;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(-100vh) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .logo {
            margin-bottom: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        .logo i {
            font-size: 4rem;
            color: #8a2be2;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.7);
        }

        .title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: 1px;
            animation: slideDown 1s ease-out;
        }

        .message {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
            animation: fadeIn 1.5s ease-out 0.5s both;
        }

        .github-container {
            margin-top: 2rem;
            animation: fadeIn 1.5s ease-out 1s both;
        }

        .github-link {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(90deg, #8a2be2, #6a1b9a);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        .github-link:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .github-link:hover:before {
            left: 100%;
        }

        .github-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(138, 43, 226, 0.6);
        }

        .github-link i {
            margin-right: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            }
            50% {
                box-shadow: 0 4px 25px rgba(138, 43, 226, 0.7);
            }
            100% {
                box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .message {
                font-size: 1.2rem;
            }
            
            .github-link {
                font-size: 1rem;
                padding: 12px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <span class="particle" style="width: 15px; height: 15px; background: #8a2be2; border-radius: 50%;"></span>
        <span class="particle" style="width: 10px; height: 10px; background: #6a1b9a; border-radius: 50%;"></span>
        <span class="particle" style="width: 20px; height: 20px; background: #8a2be2; border-radius: 50%;"></span>
        <span class="particle" style="width: 12px; height: 12px; background: #6a1b9a; border-radius: 50%;"></span>
        <span class="particle" style="width: 18px; height: 18px; background: #8a2be2; border-radius: 50%;"></span>
        <span class="particle" style="width: 14px; height: 14px; background: #6a1b9a; border-radius: 50%;"></span>
        <span class="particle" style="width: 16px; height: 16px; background: #8a2be2; border-radius: 50%;"></span>
        <span class="particle" style="width: 11px; height: 11px; background: #6a1b9a; border-radius: 50%;"></span>
        <span class="particle" style="width: 13px; height: 13px; background: #8a2be2; border-radius: 50%;"></span>
    </div>

    <div class="container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="title">DDOS Intelligence System</h1>
        <p class="message">Sorry, it's currently only available locally</p>
        
        <div class="github-container">
            <a href="https://github.com/farhadastro/ddos-intelligence-system" target="_blank" class="github-link">
                <i class="fab fa-github"></i> View on GitHub
            </a>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2023 DDOS Intelligence System</p>
    </div>

    <script>
        // Add some interactivity
        document.addEventListener('DOMContentLoaded', function() {
            const githubLink = document.querySelector('.github-link');
            
            // Create a flashing effect for the GitHub link
            setInterval(() => {
                githubLink.style.animation = 'none';
                setTimeout(() => {
                    githubLink.style.animation = 'pulse 2s infinite';
                }, 10);
            }, 5000);
            
            // Add click ripple effect
            githubLink.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                
                const x = e.clientX - e.target.offsetLeft;
                const y = e.clientY - e.target.offsetTop;
                
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
    </script>
</body>
</html>
